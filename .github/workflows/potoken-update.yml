name: 🔄 Update PO Token

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-potoken:
    name: Generate & Update PO Token
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🐳 Start bgutil PO Token provider
        id: bgutil
        run: |
          # The bgutil image is based on node:*-slim and does not ship wget/curl,
          # so we don't use Docker --health-* flags (they would always fail).
          # The next step polls /ping from the runner via curl instead.
          # --init is recommended by the upstream README for proper signal
          # handling of the Node.js process inside the container.
          docker run -d --rm \
            --name bgutil-provider \
            --init \
            -p 4416:4416 \
            brainicism/bgutil-ytdlp-pot-provider:latest
          CONTAINER_ID=$(docker inspect --format '{{.Id}}' bgutil-provider)
          echo "container_id=${CONTAINER_ID}" >> "$GITHUB_OUTPUT"
          echo "Started bgutil provider container ${CONTAINER_ID}"

      - name: ⏳ Wait for provider /ping
        run: |
          for i in $(seq 1 30); do
            if curl -fsS --max-time 3 http://127.0.0.1:4416/ping >/dev/null 2>&1; then
              PING_BODY=$(curl -fsS http://127.0.0.1:4416/ping)
              echo "bgutil provider is up: ${PING_BODY}"
              exit 0
            fi
            echo "Waiting for bgutil provider on 127.0.0.1:4416 ... (attempt ${i}/30)"
            sleep 2
          done
          echo "::error::bgutil provider did not become ready in 60s"
          echo "--- container logs ---"
          docker logs bgutil-provider || true
          exit 1

      - name: 🔑 Generate PO Token via provider HTTP API
        id: generate
        env:
          POT_PROVIDER_URL: http://127.0.0.1:4416
        run: |
          # Calls POST /get_pot on the running bgutil provider. Token generation
          # is local (Botguard JS challenge), so this works from CI runners
          # whose IP YouTube has flagged for the web player — no video page
          # scrape is needed.
          node scripts/get_potoken.js > potoken.json
          echo "--- potoken.json ---"
          cat potoken.json
          echo "--------------------"

      - name: 📤 POST PO Token to Server
        if: success()
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          if [ -z "${API_URL}" ]; then
            echo "::error::API_URL secret is not set. Add it at https://github.com/MohammadKobirShah/DL-API/settings/secrets/actions/new"
            exit 1
          fi

          POTOKEN=$(jq -r '.potoken' potoken.json)
          if [ -z "${POTOKEN}" ] || [ "${POTOKEN}" = "null" ]; then
            echo "::error::potoken missing or invalid in potoken.json"
            exit 1
          fi

          VISITOR_DATA=$(jq -r '.visitorData // empty' potoken.json)
          EXPIRES_AT=$(jq -r '.expiresAt // empty' potoken.json)
          if [ -z "${EXPIRES_AT}" ]; then
            EXPIRES_AT=$(date -u -d '+6 hours' '+%Y-%m-%dT%H:%M:%SZ')
          fi

          BODY=$(jq -n \
            --arg pot "${POTOKEN}" \
            --arg vd  "${VISITOR_DATA}" \
            --arg exp "${EXPIRES_AT}" \
            '{potoken: $pot, expiresAt: $exp}
             + (if $vd != "" and $vd != "null" then {visitorData: $vd} else {} end)')

          echo "POST ${API_URL}/api/admin/potoken"
          echo "Body: ${BODY}"

          HTTP_CODE=$(curl -sS -o /tmp/potoken-resp.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            --data-binary "${BODY}" \
            "${API_URL}/api/admin/potoken")

          echo "Response (${HTTP_CODE}):"
          cat /tmp/potoken-resp.json
          echo

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::POST /api/admin/potoken returned HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: ✅ Health Check
        if: success()
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          echo "GET ${API_URL}/health"
          curl -fsS "${API_URL}/health" | tee /dev/stderr
          echo

      - name: 🛑 Stop bgutil provider
        if: always()
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q '^bgutil-provider$'; then
            echo "Stopping bgutil provider container..."
            docker stop bgutil-provider || true
          fi
